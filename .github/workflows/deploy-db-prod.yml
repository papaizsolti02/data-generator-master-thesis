name: Deploy DB to Prod

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: windows-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SqlServer PowerShell Module
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module SqlServer -Scope CurrentUser -Force

      - name: Deploy DB Artifacts to Prod
        shell: pwsh
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.PROD_DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          $securePassword = ConvertTo-SecureString "$env:DB_PASSWORD" -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential("$env:DB_USER", $securePassword)
          ./scripts/deploy_db.ps1 `
            -Server "$env:DB_SERVER" `
            -Database "$env:DB_NAME" `
            -Credential $credential `
            -RepoRoot "." `
            -CleanupOrphans
