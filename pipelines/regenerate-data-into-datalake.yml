trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  ADLS_FILE_SYSTEM: master-thesis
  ADLS_TARGET_DIRECTORY: data

stages:
  - stage: ResetGenerateAndUpload
    displayName: Reset ADLS, generate, and upload
    jobs:
      - job: CleanAdls
        displayName: Clean ADLS Gen2 filesystem
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python 3.11
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install azure-storage-file-datalake
            displayName: Install ADLS SDK

          - script: |
              python src/adls/clean_filesystem.py
            displayName: Delete ADLS filesystem if exists
            env:
              DATALAKE_CONNECTION_STRING: $(DATALAKE_CONNECTION_STRING)
              DATALAKE_FILE_SYSTEM: $(ADLS_FILE_SYSTEM)
      
      - job: PrepareAdlsDirectory
        displayName: Create ADLS data folder
        dependsOn: CleanAdls
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python 3.11
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install dependencies

          - script: |
              python src/adls/prepare_directory.py
            displayName: Create data folder in ADLS Gen2
            env:
              DATALAKE_CONNECTION_STRING: $(DATALAKE_CONNECTION_STRING)
              DATALAKE_FILE_SYSTEM: $(ADLS_FILE_SYSTEM)
              DATALAKE_DIRECTORY: $(ADLS_TARGET_DIRECTORY)

      - job: GenerateAndUpload
        displayName: Generate and upload snapshots
        dependsOn: PrepareAdlsDirectory
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            displayName: Use Python 3.11
            inputs:
              versionSpec: '3.11'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install dependencies

          - script: |
              python src/data_generator.py
            displayName: Generate and upload dataset
            env:
              DATALAKE_CONNECTION_STRING: $(DATALAKE_CONNECTION_STRING)
              DATALAKE_FILE_SYSTEM: $(ADLS_FILE_SYSTEM)
              DATALAKE_DIRECTORY: $(ADLS_TARGET_DIRECTORY)
