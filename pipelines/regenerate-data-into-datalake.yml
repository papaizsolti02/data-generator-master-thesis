trigger:
	branches:
		include:
			- main

pr:
	branches:
		include:
			- main

pool:
	vmImage: ubuntu-latest

stages:
	- stage: Build
		displayName: Basic pipeline
		jobs:
			- job: Validate
				displayName: Validate workspace
				steps:
					- checkout: self

					- script: |
							echo "Repository checked out successfully."
							echo "Pipeline is running on $(Agent.OS)."
						displayName: Run basic checks
